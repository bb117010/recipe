<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷蔵庫レシピ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&family=Mochiy+Pop+One&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}

  :root{
    --bg:#F7F4EE;
    --surface:#FFFFFF;
    --ink:#2B2622;
    --ink-soft:#6E665E;
    --line:#E7E1D6;
    --accent:#D9542B;
    --accent-deep:#B23E1C;
    --gold:#E0A52E;
    --chip:#F0EADF;
    --chip-ink:#5A5249;
    --display:'Zen Kaku Gothic New',sans-serif;
    --body:'Zen Kaku Gothic New',sans-serif;
    --r:14px;
    --shadow:0 1px 2px rgba(43,38,34,.04),0 4px 16px rgba(43,38,34,.06);
    --shadow-lg:0 8px 40px rgba(43,38,34,.16);
    --header-bg:linear-gradient(135deg,#D9542B,#E0A52E);
    --header-ink:#FFF;
    --hero-pattern:none;
    --tag-r:999px;
    --card-border:1px solid var(--line);
  }

  /* ===== マリオ ===== */
  body.t-mario{
    --bg:#5C94FC;
    --surface:#FFFFFF;
    --ink:#16213E;
    --ink-soft:#46527A;
    --line:#16213E;
    --accent:#E52521;
    --accent-deep:#B81815;
    --gold:#FBD000;
    --chip:#FFF7E0;
    --chip-ink:#3A3320;
    --display:'Mochiy Pop One',sans-serif;
    --body:'Zen Kaku Gothic New',sans-serif;
    --r:7px;
    --shadow:3px 3px 0 rgba(22,33,62,.18);
    --shadow-lg:6px 6px 0 rgba(22,33,62,.3);
    --header-bg:#E52521;
    --header-ink:#FFF;
    --hero-pattern:repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 14px,transparent 14px 28px);
    --tag-r:6px;
    --card-border:3px solid var(--line);
  }
  body.t-mario .chip,body.t-mario .card,body.t-mario .seg,
  body.t-mario .theme-pill,body.t-mario .sortbtn{border-width:3px!important;border-style:solid;border-color:var(--line);}
  body.t-mario .hero h1{text-shadow:3px 3px 0 rgba(22,33,62,.35);}

  /* ===== ディズニー ===== */
  body.t-disney{
    --bg:#ECEAFB;
    --surface:#FFFFFF;
    --ink:#332A5E;
    --ink-soft:#7B73A8;
    --line:#E2DAF2;
    --accent:#7048C4;
    --accent-deep:#553399;
    --gold:#E89AC7;
    --chip:#F4EFFB;
    --chip-ink:#5A4E86;
    --display:'Zen Maru Gothic',sans-serif;
    --body:'Zen Kaku Gothic New',sans-serif;
    --r:22px;
    --shadow:0 2px 8px rgba(112,72,196,.1),0 8px 30px rgba(112,72,196,.12);
    --shadow-lg:0 16px 50px rgba(112,72,196,.28);
    --header-bg:linear-gradient(135deg,#5A3AA0,#9B5FC8 60%,#E89AC7);
    --header-ink:#FFF;
    --hero-pattern:radial-gradient(circle at 18% 28%,rgba(255,255,255,.6) 0 2px,transparent 2px),radial-gradient(circle at 72% 62%,rgba(255,255,255,.5) 0 1.5px,transparent 1.5px),radial-gradient(circle at 44% 84%,rgba(255,255,255,.55) 0 2px,transparent 2px),radial-gradient(circle at 88% 20%,rgba(255,255,255,.45) 0 1.5px,transparent 1.5px);
    --tag-r:999px;
    --card-border:1px solid var(--line);
  }
  body.t-disney .hero h1{text-shadow:0 2px 10px rgba(40,25,80,.4);}

  body{
    font-family:var(--body);
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    transition:background .35s,color .35s;
  }

  /* ===== ヘッダー/ヒーロー ===== */
  .hero{
    position:relative;
    background:var(--header-bg);
    color:var(--header-ink);
    padding:30px 22px 26px;
    overflow:hidden;
  }
  .hero::after{content:"";position:absolute;inset:0;background-image:var(--hero-pattern);pointer-events:none;}
  .hero-inner{position:relative;z-index:1;max-width:680px;margin:0 auto;}
  .hero .kicker{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.85;font-weight:700;margin-bottom:8px;}
  .hero h1{font-family:var(--display);font-size:30px;line-height:1.15;font-weight:900;letter-spacing:-.5px;}
  .hero p{font-size:13.5px;opacity:.92;margin-top:8px;max-width:34em;}

  /* テーマ切替ピル */
  .theme-pills{display:flex;gap:8px;margin-top:18px;}
  .theme-pill{
    padding:7px 14px;border-radius:var(--r);
    background:rgba(255,255,255,.16);color:var(--header-ink);
    border:1.5px solid rgba(255,255,255,.35);
    font-family:var(--display);font-size:12.5px;cursor:pointer;
    transition:all .15s;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);
  }
  .theme-pill.on{background:#fff;color:var(--accent);border-color:#fff;}

  .wrap{max-width:680px;margin:0 auto;padding:0 16px 120px;}

  /* 別ページへのリンクバナー */
  .xlink{display:flex;align-items:center;gap:13px;width:100%;margin-top:20px;background:var(--surface);border:var(--card-border);border-radius:var(--r);padding:14px 16px;cursor:pointer;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:transform .1s;-webkit-tap-highlight-color:transparent;}
  .xlink:active{transform:scale(.99);}
  .xlink-emoji{font-size:30px;flex-shrink:0;}
  .xlink-body{flex:1;min-width:0;}
  .xlink-k{font-size:10.5px;letter-spacing:1.5px;font-weight:700;color:var(--accent);text-transform:uppercase;}
  .xlink-t{font-family:var(--display);font-size:16px;font-weight:900;letter-spacing:-.3px;margin-top:1px;}
  .xlink-s{font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5;}
  .xlink-arrow{font-size:20px;color:var(--accent);font-weight:700;flex-shrink:0;}

  /* ヒーロー右上のアクションアイコン */
  .hero-actions{position:absolute;top:16px;right:16px;z-index:3;display:flex;gap:9px;}
  .hero-act{position:relative;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);backdrop-filter:blur(6px);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .12s,background .15s;}
  .hero-act:active{transform:scale(.92);}
  .hero-act:hover{background:rgba(255,255,255,.28);}
  .ha-emoji{font-size:21px;line-height:1;}
  .ha-badge{position:absolute;top:-3px;right:-3px;min-width:19px;height:19px;border-radius:99px;background:#fff;color:var(--accent);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 1px 4px rgba(0,0,0,.25);}
  body.t-mario .hero-act{border-width:2px;border-radius:8px;}
  body.t-mario .ha-badge{color:var(--accent);border:2px solid var(--accent);}

  /* 汎用シート(メモ/マイレシピ/フォーム共通) */
  .sheet-bg{position:fixed;inset:0;background:rgba(30,24,20,.5);backdrop-filter:blur(3px);z-index:60;display:none;opacity:0;transition:opacity .25s;}
  .sheet-bg.show{display:block;opacity:1;}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-height:94vh;background:var(--bg);border-radius:24px 24px 0 0;z-index:61;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1),visibility .3s;overflow:hidden;display:flex;flex-direction:column;visibility:hidden;}
  .sheet.show{transform:translateY(0);visibility:visible;}
  .sheet-in{max-width:680px;margin:0 auto;width:100%;display:flex;flex-direction:column;overflow:hidden;}
  .sheet-handle{width:40px;height:5px;border-radius:99px;background:var(--line);margin:10px auto 4px;flex-shrink:0;}
  .sheet-head{display:flex;align-items:center;gap:10px;padding:8px 20px 14px;border-bottom:1.5px solid var(--line);flex-shrink:0;}
  .sheet-title{font-family:var(--display);font-size:19px;font-weight:900;letter-spacing:-.3px;}
  .sheet-title .cnt{font-size:13px;color:var(--ink-soft);font-weight:700;margin-left:6px;}
  .sheet-close{margin-left:auto;width:32px;height:32px;border-radius:50%;border:none;background:var(--chip);color:var(--ink);font-size:17px;cursor:pointer;}
  .sheet-scroll{overflow-y:auto;padding:16px 20px 30px;}

  /* 買い物メモ */
  .memo-add{display:flex;gap:8px;margin-bottom:16px;}
  .memo-input{flex:1;border:var(--card-border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;}
  .memo-input:focus{border-color:var(--accent);}
  .memo-addbtn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .memo-item{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
  body.t-mario .memo-item{border:2px solid var(--line);}
  .memo-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;-webkit-tap-highlight-color:transparent;transition:all .12s;}
  .memo-check.on{background:var(--accent);border-color:var(--accent);}
  .memo-text{flex:1;font-size:14px;}
  .memo-item.checked .memo-text{text-decoration:line-through;color:var(--ink-soft);}
  .memo-del{background:none;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;padding:2px 4px;-webkit-tap-highlight-color:transparent;}
  .memo-tools{display:flex;gap:8px;margin-top:14px;}
  .memo-tool{flex:1;background:var(--chip);color:var(--chip-ink);border:none;border-radius:10px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .memo-empty{text-align:center;color:var(--ink-soft);padding:36px 20px;}
  .memo-empty .big{font-size:38px;margin-bottom:12px;}
  .memo-empty .sub{font-size:13px;line-height:1.7;}

  /* マイレシピ一覧 */
  .myrec-newbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:14px;font-family:var(--display);font-size:15px;font-weight:900;cursor:pointer;margin-bottom:16px;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;}
  .myrec-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);}
  body.t-mario .myrec-card{border:3px solid var(--line);}
  .myrec-top{display:flex;align-items:center;gap:11px;}
  .myrec-emoji{font-size:28px;}
  .myrec-h{flex:1;min-width:0;}
  .myrec-name{font-family:var(--display);font-size:16px;font-weight:900;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .myrec-badge{font-size:9.5px;font-weight:700;border-radius:4px;padding:2px 6px;}
  .myrec-badge.pub{background:#7BA06B;color:#fff;}
  .myrec-badge.priv{background:var(--chip);color:var(--ink-soft);}
  .myrec-meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .myrec-acts{display:flex;gap:8px;margin-top:12px;}
  .myrec-act{flex:1;background:var(--chip);color:var(--chip-ink);border:none;border-radius:9px;padding:9px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .myrec-act.danger{color:var(--accent);}
  .myrec-act.cook{background:var(--accent);color:#fff;}

  /* レシピ登録フォーム */
  .form-group{margin-bottom:18px;}
  .form-label{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .form-label .req{font-size:10px;color:#fff;background:var(--accent);border-radius:4px;padding:1px 6px;}
  .form-label .opt{font-size:10px;color:var(--ink-soft);background:var(--chip);border-radius:4px;padding:1px 6px;}
  .form-input{width:100%;border:var(--card-border);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--ink);outline:none;}
  .form-input:focus{border-color:var(--accent);}
  textarea.form-input{resize:vertical;min-height:60px;line-height:1.6;}
  .emoji-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .emoji-opt{width:42px;height:42px;border-radius:10px;border:2px solid var(--line);background:var(--surface);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all .1s;}
  .emoji-opt.on{border-color:var(--accent);background:var(--chip);}
  .genre-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .genre-opt{padding:7px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .genre-opt.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .row-list{display:flex;flex-direction:column;gap:8px;}
  .ing-edit-row{display:flex;gap:6px;align-items:center;}
  .ing-edit-row .item{flex:2;}
  .ing-edit-row .qty{flex:1;min-width:0;}
  .ing-edit-row .unit{flex:1;min-width:0;}
  .row-del{background:var(--chip);border:none;border-radius:8px;width:34px;height:38px;flex-shrink:0;color:var(--ink-soft);font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .step-edit-row{display:flex;gap:6px;align-items:flex-start;}
  .step-edit-row .step-n{flex-shrink:0;width:26px;height:38px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:900;color:var(--accent);}
  .step-edit-row .form-input{flex:1;}
  .add-row{background:var(--chip);color:var(--chip-ink);border:none;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;width:100%;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pub-toggle{display:flex;align-items:center;gap:12px;background:var(--surface);border:var(--card-border);border-radius:var(--r);padding:14px 15px;box-shadow:var(--shadow);}
  .pub-info{flex:1;}
  .pub-t{font-size:14px;font-weight:700;}
  .pub-s{font-size:11px;color:var(--ink-soft);margin-top:2px;line-height:1.5;}
  .toggle{width:48px;height:28px;border-radius:99px;background:var(--line);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;-webkit-tap-highlight-color:transparent;}
  .toggle.on{background:#7BA06B;}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .toggle.on::after{transform:translateX(20px);}
  .form-actions{display:flex;gap:10px;margin-top:8px;position:sticky;bottom:0;background:var(--bg);padding:12px 0 4px;}
  .form-btn{flex:1;border:none;border-radius:var(--r);padding:14px;font-family:var(--display);font-size:15px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .form-btn.save{background:var(--accent);color:#fff;}
  .form-btn.cancel{background:var(--chip);color:var(--ink-soft);flex:0 0 90px;}
  .form-err{background:#fdecea;color:#c0392b;border-radius:9px;padding:10px 13px;font-size:12.5px;margin-bottom:14px;display:none;}
  body.t-disney .form-err{background:#f9ecf3;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#2A2521;color:#fff;padding:13px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:90;transition:transform .3s;box-shadow:var(--shadow-lg);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* アカウント画面 */
  .acc-intro{font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:18px;background:var(--chip);border-radius:12px;padding:14px;}
  .acc-status{display:flex;align-items:center;gap:13px;background:var(--surface);border:var(--card-border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
  .acc-avatar{width:46px;height:46px;border-radius:50%;background:#7BA06B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0;}
  .acc-info{flex:1;min-width:0;}
  .acc-label{font-size:11px;color:var(--ink-soft);font-weight:700;}
  .acc-email{font-size:15px;font-weight:700;word-break:break-all;}
  .acc-note{font-size:12px;color:var(--ink-soft);line-height:1.6;margin-bottom:16px;padding:0 2px;}
  .acc-btn{width:100%;background:var(--surface);border:var(--card-border);border-radius:var(--r);padding:14px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;color:inherit;}
  .acc-btn:active{transform:scale(.98);}
  .acc-btn.login{background:var(--accent);color:#fff;}
  .acc-btn.signup{background:var(--surface);color:var(--accent);border:2px solid var(--accent);}
  .acc-btn.logout{color:var(--accent);}
  .acc-btn.upload{background:#7BA06B;color:#fff;font-size:13px;}
  .auth-btns{display:flex;gap:10px;}
  .auth-btns .acc-btn{margin-bottom:0;}

  /* 認証画面(分割) */
  .auth-back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:4px 2px;margin-bottom:6px;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  .auth-h{font-family:var(--display);font-size:20px;font-weight:900;margin-bottom:18px;letter-spacing:-.3px;}
  .pw-rules{background:var(--chip);border-radius:11px;padding:13px 15px;margin-bottom:14px;}
  .pw-rule{font-size:12.5px;color:var(--ink-soft);line-height:1.9;transition:color .15s;}
  .pw-rule.ok{color:#4a9a3a;font-weight:700;}
  .pw-rule.ok::before{content:"✓ ";}
  body.t-disney .pw-rule.ok{color:#6b9e4f;}
  .verify-info{font-size:13px;color:var(--ink-soft);line-height:1.7;margin-bottom:18px;background:var(--chip);border-radius:11px;padding:14px;}
  .code-input{font-size:28px;text-align:center;letter-spacing:12px;font-family:var(--display);font-weight:900;padding:14px;}
  .code-input::placeholder{letter-spacing:8px;color:var(--line);}
  .acc-hint{font-size:11.5px;color:var(--ink-soft);line-height:1.6;margin-top:14px;padding:0 2px;}

  /* マイレシピのクラウドバナー */
  .myrec-cloud{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;font-weight:700;border-radius:11px;padding:11px 13px;margin-bottom:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .myrec-cloud.on{background:#eaf3e6;color:#4a7a3a;}
  .myrec-cloud.off{background:var(--chip);color:var(--chip-ink);}
  body.t-disney .myrec-cloud.on{background:#ede8f7;color:#6b4f9e;}
  .mc-link{margin-left:auto;color:var(--accent);font-weight:700;}

  /* みんなのレシピ */
  .pub-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  body.t-mario .pub-card{border:2px solid var(--line);}
  .pub-card:active{transform:scale(.99);}
  .pub-emoji{font-size:28px;flex-shrink:0;}
  .pub-body{flex:1;min-width:0;}
  .pub-name{font-family:var(--display);font-size:15.5px;font-weight:900;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .pub-mine{font-size:9.5px;font-weight:700;background:#7BA06B;color:#fff;border-radius:4px;padding:2px 6px;}
  .pub-meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
  .pub-arrow{font-size:22px;color:var(--ink-soft);flex-shrink:0;}

  /* セクション見出し */
  .sec-head{display:flex;align-items:baseline;gap:10px;margin:30px 2px 14px;}
  .sec-head .n{font-family:var(--display);font-size:13px;color:var(--accent);font-weight:900;letter-spacing:1px;}
  .sec-head .t{font-size:14px;font-weight:700;}
  .sec-head .hint{font-size:11.5px;color:var(--ink-soft);margin-left:auto;}

  /* 材料カテゴリ */
  .cat{margin-bottom:16px;}
  .cat-name{font-size:13.5px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .cat-name .ic{font-size:16px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{
    padding:8px 14px;border-radius:var(--tag-r);

80, "difficulty": 2, "type": "ご飯・麺", "required": ["パスタ", "トマト", "モッツァレラチーズ"], "ingredients": [{"item": "パスタ", "qty": 160, "unit": "g", "rt": "g"}, {"item": "トマト", "qty": 2, "unit": "個", "rt": "count"}, {"item": "モッツァレラチーズ", "qty": 80, "unit": "g", "rt": "g"}, {"item": "バジル", "qty": 1, "unit": "少々", "rt": "pinch"}, {"item": "オリーブオイル", "qty": 3, "unit": "大さじ", "rt": "tbsp"}, {"item": "塩", "qty": 1, "unit": "少々", "rt": "pinch"}], "steps": ["トマトとチーズを角切りにしオイルと和える。", "パスタを茹でて冷水で締める。", "和えてバジルをのせる。"], "tips": ["よく冷やすと美味しい。"]}]</script>
<script>
/* ====== データ ====== */
const RECIPES = JSON.parse(document.getElementById('recipeData').textContent);
const MUSHROOM_CHILDREN = ["しいたけ","しめじ","えのき","まいたけ","エリンギ","マッシュルーム","なめこ"];

// 組み込みレシピ + マイレシピ を合わせた検索対象
function allRecipes(){
  return RECIPES.concat(loadMyRecipes().map(toRecipeShape));
}

const CATEGORIES = [
  {ic:"🥩",name:"肉・魚",items:["鶏もも肉","鶏むね肉","鶏ひき肉","豚バラ肉","豚こま切れ肉","豚ロース肉","牛こま切れ肉","ひき肉","ベーコン","ハム","ウインナー","ツナ缶","サーモン","ぶり","さば","白身魚","エビ","あさり","かに風味かまぼこ","ちくわ","とんかつ"]},
  {ic:"🥬",name:"野菜",items:["玉ねぎ","にんにく","生姜","にんじん","じゃがいも","キャベツ","白菜","レタス","ほうれん草","小松菜","もやし","ピーマン","パプリカ","トマト","なす","ズッキーニ","ブロッコリー","かぼちゃ","大根","れんこん","ごぼう","きゅうり","長ねぎ","にら","豆苗","コーン缶"]},
  {ic:"🍄",name:"きのこ",expander:true,items:[]},
  {ic:"🥚",name:"卵・乳製品・豆腐",items:["卵","牛乳","生クリーム","チーズ","モッツァレラチーズ","豆腐","油揚げ","こんにゃく","納豆"]},
  {ic:"🍚",name:"主食・粉・皮",items:["ご飯","米","パスタ","ペンネ","マカロニ","ラザニア","うどん","そば","そば粉","中華麺","焼きそば麺","食パン","ピザ生地","餃子の皮","春巻きの皮","トマト缶","ひじき","わかめ","キムチ"]},
];

/* ====== 状態 ====== */
let selected = new Set();
let servings = 2;
let sortKey = "match";
let sortAsc = true;
let favOnly = false;
let favorites = new Set(loadFavs());
function loadFavs(){try{const r=localStorage.getItem('fridge_favs_v1');return r?JSON.parse(r):[];}catch(e){return window.__favs||[];}}
function saveFavs(){try{localStorage.setItem('fridge_favs_v1',JSON.stringify([...favorites]));}catch(e){window.__favs=[...favorites];}}
let activeGenres = new Set();
let activeType = "__all";
let lastResults = [];
let lastAlmost = [];

/* ====== 分量計算 ====== */
function toFraction(n){
  const w=Math.floor(n), f=n-w;
  let fs="";
  if(Math.abs(f-0.5)<0.06)fs="1/2";
  else if(Math.abs(f-0.25)<0.06)fs="1/4";
  else if(Math.abs(f-0.75)<0.06)fs="3/4";
  else if(Math.abs(f-0.33)<0.06)fs="1/3";
  else if(Math.abs(f-0.67)<0.06)fs="2/3";
  else if(f>0.06)return n.toFixed(1);
  if(w===0&&fs)return fs;
  if(fs)return w+"と"+fs;
  return ""+w;
}
function fmtQty(ing,serv){
  const v=ing.qty*serv/2, rt=ing.rt, unit=ing.unit;
  if(rt==="pinch")return {a:"",u:unit};
  if(rt==="g"||rt==="ml"){let r=Math.max(5,Math.round(v/5)*5);return {a:""+r,u:unit};}
  if(rt==="tbsp"||rt==="tsp"){let r=Math.round(v*2)/2;if(r<0.5)r=0.5;return {a:(r%1===0?""+r:toFraction(r)),u:unit};}
  let r=Math.round(v*4)/4;if(r<0.25)r=0.25;return {a:toFraction(r),u:unit};
}

/* ====== マッチング ====== */
function normSel(){const s=new Set(selected);if(MUSHROOM_CHILDREN.some(c=>s.has(c)))s.add("きのこ");return s;}
function findRecipes(){const s=normSel();return allRecipes().filter(r=>r.required.every(i=>s.has(i)));}
function findAlmost(){const s=normSel();return allRecipes().map(r=>({r,miss:r.required.filter(i=>!s.has(i))})).filter(x=>x.miss.length===1);}
function matchScore(r){const s=normSel();const hit=r.required.filter(i=>s.has(i)).length;return hit/r.required.length;}

/* ====== カテゴリ描画 ====== */
function renderCats(){
  const root=document.getElementById('cats');root.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const d=document.createElement('div');d.className='cat';
    let h=`<div class="cat-name"><span class="ic">${cat.ic}</span>${cat.name}</div><div class="chips">`;
    if(cat.expander)h+=`<div class="chip expander" data-item="きのこ" data-exp="1">きのこ</div>`;
    cat.items.forEach(it=>h+=`<div class="chip" data-item="${it}">${it}</div>`);
    h+=`</div>`;
    if(cat.expander){
      h+=`<div class="subchips" id="subMush"><div class="lab">「きのこ」だけでもOK。種類を指定するなら選んでね</div><div class="chips">`;
      MUSHROOM_CHILDREN.forEach(c=>h+=`<div class="chip" data-item="${c}">${c}</div>`);
      h+=`</div></div>`;
    }
    d.innerHTML=h;root.appendChild(d);
  });
  root.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      if(ch.dataset.exp){document.getElementById('subMush').classList.toggle('open');ch.classList.toggle('open');}
      const it=ch.dataset.item;
      if(selected.has(it)){selected.delete(it);ch.classList.remove('on');}
      else{selected.add(it);ch.classList.add('on');}
      updateDock();
      // 結果表示中ならリアルタイム更新
      if(document.getElementById('results').style.display!=='none'){
        if(selected.size===0){
          document.getElementById('results').style.display='none';
          document.getElementById('controls').classList.remove('show');
        }else{
          lastResults=findRecipes();lastAlmost=findAlmost();renderResults();
        }
      }
    });
  });
}

/* ====== ドック ====== */
function updateDock(){
  const dock=document.getElementById('dock');
  const cnt=document.getElementById('dockCount');
  const items=document.getElementById('dockItems');
  if(selected.size===0){dock.classList.add('hide');return;}
  dock.classList.remove('hide');
  cnt.textContent=`${selected.size}品の材料を選択中`;
  items.textContent=[...selected].join('・');
}

/* ====== 検索実行 ====== */
function runSearch(){
  lastResults=findRecipes();
  lastAlmost=findAlmost();
  document.getElementById('controls').classList.add('show');
  document.getElementById('results').style.display='block';
  renderResults();
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function sortRecipes(list){
  const arr=[...list];
  const s=normSel();
  if(sortKey==="match"){
    // おすすめ: 選んだ材料をたくさん使う順 → 同数なら品数(required)が多い順 → 安い順
    const usedCount=r=>r.required.filter(i=>s.has(i)).length;
    arr.sort((a,b)=>usedCount(b)-usedCount(a)||b.required.length-a.required.length||a.cost-b.cost);
  }else{
    arr.sort((a,b)=>{
      let d=a[sortKey]-b[sortKey];
      return sortAsc?d:-d;
    });
  }
  return arr;
}

function diffDots(n){return "●".repeat(n)+"○".repeat(3-n);}
function diffLabel(n){return n===1?"かんたん":n===2?"ふつう":"本格";}

function renderResults(){
  const meta=document.getElementById('resultMeta');
  const list=document.getElementById('cardList');
  const almostWrap=document.getElementById('almostWrap');
  const gf=document.getElementById('genreFilter');
  const tt=document.getElementById('typeTabs');

  // --- 料理タイプのタブ(第1軸) ---
  const TYPE_ORDER=["主菜","ご飯・麺","汁物","副菜・サラダ"];
  const ttOuter=document.querySelector('.type-tabs-outer');
  if(favOnly){
    ttOuter.style.display='none';
  }else{
    tt.style.display='flex'; // 中身は下で構築
    // 各タイプの件数(全結果ベース)
    const typeCount={};
    lastResults.forEach(r=>{typeCount[r.type]=(typeCount[r.type]||0)+1;});
    const typesPresent=TYPE_ORDER.filter(t=>typeCount[t]>0);
    // タイプが1種類以下ならタブ自体不要(「すべて」と1タブだけになり冗長)
    if(typesPresent.length<=1){
      ttOuter.style.display='none';
      activeType="__all";
    }else{
      ttOuter.style.display='block';
      // activeTypeが現在の結果に存在しなければ「すべて」に戻す
      if(activeType!=="__all" && !typeCount[activeType])activeType="__all";
      let tabs=`<button class="ttab${activeType==='__all'?' on':''}" data-type="__all">すべて<span class="cnt">${lastResults.length}</span></button>`;
      tabs+=typesPresent.map(t=>`<button class="ttab${activeType===t?' on':''}" data-type="${t}">${t}<span class="cnt">${typeCount[t]}</span></button>`).join('');
      tt.innerHTML=tabs;
      tt.querySelectorAll('.ttab').forEach(b=>{
        b.addEventListener('click',()=>{activeType=b.dataset.type;renderResults();});
      });
    }
  }

  // --- タイプで絞る ---
  let shown=lastResults;
  if(favOnly)shown=shown.filter(r=>favorites.has(r.id));
  if(!favOnly && activeType!=="__all")shown=shown.filter(r=>r.type===activeType);

  // --- ジャンル絞り込み(第2軸): 現在のタイプ内に存在するジャンルのみ ---
  const GENRE_LABEL={'和':'和食','洋':'洋食','中':'中華','麺':'麺類','丼':'丼もの','汁':'汁物','副':'副菜','仏':'フレンチ','伊':'イタリアン','他':'その他'};
  const genrePool=(!favOnly && activeType!=="__all")?lastResults.filter(r=>r.type===activeType):lastResults;
  const genresInResult=[...new Set(genrePool.map(r=>r.genre))];
  // タイプ内に存在しないジャンルが選択中なら解除
  [...activeGenres].forEach(g=>{if(!genresInResult.includes(g))activeGenres.delete(g);});
  if(!favOnly && genresInResult.length>1){
    gf.style.display='flex';
    gf.innerHTML=`<span class="gf-lab">味つけ:</span><div class="gchip${activeGenres.size===0?' on':''}" data-g="__all">すべて</div>`+
      genresInResult.map(g=>`<div class="gchip${activeGenres.has(g)?' on':''}" data-g="${g}">${GENRE_LABEL[g]||g}</div>`).join('');
    gf.querySelectorAll('.gchip').forEach(c=>{
      c.addEventListener('click',()=>{
        const g=c.dataset.g;
        if(g==='__all'){activeGenres.clear();}
        else{if(activeGenres.has(g))activeGenres.delete(g);else activeGenres.add(g);}
        renderResults();
      });
    });
  }else{gf.style.display='none';gf.innerHTML='';}

  if(activeGenres.size>0)shown=shown.filter(r=>activeGenres.has(r.genre));
  shown=sortRecipes(shown);

  // メタ
  const q=[...selected].join('・');
  if(favOnly){
    meta.innerHTML=`お気に入り <b>${shown.length}</b> 品`;
  }else{
    meta.innerHTML=`<b>${shown.length}</b> 品見つかりました　<span class="q">（${q||'材料未選択'} で検索）</span>`;
  }

  // カード
  if(shown.length===0){
    const filtered=(activeGenres.size>0||activeType!=="__all")&&lastResults.length>0;
    list.innerHTML=`<div class="empty"><div class="big">${favOnly?'♡':(filtered?'🔍':'🍳')}</div><div class="ttl">${favOnly?'お気に入りはまだありません':(filtered?'この絞り込みに合う料理はありません':'作れる料理が見つかりません')}</div><div class="sub">${favOnly?'カードのハートを押すとここに集まります':(filtered?'タブを「すべて」に戻すと作れる料理が表示されます':'材料を足すか、卵・玉ねぎ・ご飯など"つぶしが効く"材料を選ぶと見つかりやすいです')}</div></div>`;
  }else{
    list.innerHTML=shown.map(r=>cardHTML(r)).join('');
  }

  // あと1つ
  if(!favOnly && lastAlmost.length>0 && selected.size>0){
    const am=lastAlmost.slice(0,6);
    almostWrap.innerHTML=`<div class="almost-head">🛒 あと1つ買えば作れる</div>`+
      am.map(x=>cardHTML(x.r,x.miss[0])).join('');
  }else{
    almostWrap.innerHTML='';
  }

  bindCards();
}

function cardHTML(r,missing){
  const s=normSel();
  const stats=`<div class="card-stats">
    <span class="stat cost">¥${Math.round(r.cost*servings/2)}<span class="lab">/${servings}人前</span></span>
    <span class="stat">⏱ ${r.time}<span class="lab">分</span></span>
    <span class="stat"><span class="diff-dots">${diffDots(r.difficulty)}</span> ${diffLabel(r.difficulty)}</span>
    <span class="stat">🔥 ${Math.round(r.kcal*servings/2)}<span class="lab">kcal</span></span>
  </div>`;
  const uses=`<div class="card-uses">使う材料：${r.required.map(i=>{
    const hit=s.has(i);return `<span class="u${hit?' hit':''}">${i}</span>`;
  }).join('')}</div>`;
  const missHTML=missing?`<div class="almost-miss">不足：<span class="add">${missing}</span> を買えばOK <button class="mini-memo" onclick="event.stopPropagation();memoAddQuick('${escapeAttr(missing)}')">🛒メモ</button></div>`:'';
  const favOn=favorites.has(r.id)?' on':'';
  const myBadge=r.isMine?`<span class="card-genre" style="background:#7BA06B;color:#fff;margin-left:5px;">MY</span>`:'';
  return `<div class="card${missing?' almost-card':''}" data-id="${r.id}">
    <button class="fav-btn${favOn}" data-fav="${r.id}">${favorites.has(r.id)?'♥':'♡'}</button>
    <div class="card-body">
      <div class="card-top">
        <div class="card-emoji">${r.emoji}</div>
        <div class="card-h">
          <div class="card-name">${r.name}</div>
          <span class="card-genre">${r.genre}</span>${myBadge}
        </div>
      </div>
      ${stats}${uses}${missHTML}
    </div>
  </div>`;
}

function bindCards(){
  document.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',e=>{
      if(e.target.closest('.fav-btn'))return;
      openModal(c.dataset.id);
    });
  });
  document.querySelectorAll('.fav-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const id=b.dataset.fav;
      if(favorites.has(id))favorites.delete(id);else favorites.add(id);
      saveFavs();
      renderResults();
    });
  });
}

/* ====== モーダル ====== */
let modalServings=2;
function openModal(id){
  const r=allRecipes().find(x=>x.id===id);if(!r)return;
  modalServings=servings;
  renderModal(r);
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}
function renderModal(r){
  const s=normSel();
  const ingHTML=r.ingredients.map(ing=>{
    const q=fmtQty(ing,modalServings);
    const hit=[...s].some(sel=>ing.item.includes(sel));

   ============================================================ */
function loadMemo(){try{const r=localStorage.getItem('shopping_memo_v1');return r?JSON.parse(r):[];}catch(e){return window.__memo||[];}}
function saveMemo(arr){try{localStorage.setItem('shopping_memo_v1',JSON.stringify(arr));}catch(e){window.__memo=arr;}updateBadges();}
function addMemoItem(text){
  text=(text||'').trim();if(!text)return;
  const arr=loadMemo();
  if(arr.some(m=>m.text===text&&!m.checked)){showToast('「'+text+'」は既にメモにあります');return;}
  arr.push({id:'m'+Date.now()+Math.random().toString(36).slice(2,6),text,checked:false,addedAt:Date.now()});
  saveMemo(arr);
}
function openMemo(){renderMemo();document.getElementById('memoBg').classList.add('show');document.getElementById('memoSheet').classList.add('show');document.body.style.overflow='hidden';}
function closeMemo(){document.getElementById('memoBg').classList.remove('show');document.getElementById('memoSheet').classList.remove('show');document.body.style.overflow='';}
function renderMemo(){
  const arr=loadMemo();
  const cnt=document.getElementById('memoCnt');
  const unchecked=arr.filter(m=>!m.checked).length;
  cnt.textContent=arr.length?`（${unchecked}件）`:'';
  const sc=document.getElementById('memoScroll');
  let html=`<div class="memo-add">
    <input class="memo-input" id="memoInput" placeholder="材料を入力して追加" onkeydown="if(event.key==='Enter')memoAddFromInput()">
    <button class="memo-addbtn" onclick="memoAddFromInput()">追加</button>
  </div>`;
  if(arr.length===0){
    html+=`<div class="memo-empty"><div class="big">🛒</div><div class="sub">買い物メモは空です。<br>レシピの材料や「あと1つで作れる」から追加したり、上の欄で直接入力できます。</div></div>`;
  }else{
    // 未チェックを上、チェック済みを下
    const sorted=[...arr].sort((a,b)=>(a.checked?1:0)-(b.checked?1:0));
    html+=sorted.map(m=>`<div class="memo-item${m.checked?' checked':''}">
      <div class="memo-check${m.checked?' on':''}" onclick="memoToggle('${m.id}')">${m.checked?'✓':''}</div>
      <span class="memo-text">${escapeHtml(m.text)}</span>
      <button class="memo-del" onclick="memoDel('${m.id}')">✕</button>
    </div>`).join('');
    html+=`<div class="memo-tools">
      <button class="memo-tool" onclick="memoClearChecked()">✓ 済みを消す</button>
      <button class="memo-tool" onclick="memoClearAll()">すべて消す</button>
    </div>`;
  }
  sc.innerHTML=html;
}
function memoAddFromInput(){const i=document.getElementById('memoInput');addMemoItem(i.value);i.value='';renderMemo();}
function memoToggle(id){const arr=loadMemo();const m=arr.find(x=>x.id===id);if(m)m.checked=!m.checked;saveMemo(arr);renderMemo();}
function memoDel(id){let arr=loadMemo();arr=arr.filter(x=>x.id!==id);saveMemo(arr);renderMemo();}
function memoClearChecked(){let arr=loadMemo();arr=arr.filter(x=>!x.checked);saveMemo(arr);renderMemo();}
function memoClearAll(){if(loadMemo().length&&!confirm('買い物メモをすべて消しますか？'))return;saveMemo([]);renderMemo();}

// 単位からroundType推定
function guessRt(unit){
  unit=(unit||'').trim();
  if(/^(g|グラム|ｇ)$/i.test(unit))return 'g';
  if(/^(ml|cc|ミリ|㏄|ｍｌ)$/i.test(unit))return 'ml';
  if(/大さじ/.test(unit))return 'tbsp';
  if(/小さじ/.test(unit))return 'tsp';
  if(/(少々|ひとつまみ|適量|お好み)/.test(unit))return 'pinch';
  if(/(個|枚|本|片|玉|株|丁|パック|缶|束|尾|切れ|杯|房|かけ)/.test(unit))return 'count';
  return 'count';
}
// マイレシピを内部レシピ形式に変換(検索・モーダル用)
function toRecipeShape(mr){
  return {
    id:mr.id, name:mr.name, genre:mr.genre||'他', emoji:mr.emoji||'🍽',
    time:mr.time||0, cost:mr.cost||0, kcal:mr.kcal||0, difficulty:mr.difficulty||1,
    required:mr.required||[],
    ingredients:(mr.ingredients||[]).map(i=>({item:i.item,qty:(typeof i.qty==='number'?i.qty:parseFloat(i.qty)||1),unit:i.unit||'',rt:guessRt(i.unit)})),
    steps:mr.steps||[], tips:mr.tips?[mr.tips]:[],
    isMine:true, isPublic:!!mr.isPublic,
  };
}

function formSetEmoji(e){formState.emoji=e;renderForm();}
function formSetGenre(g){formState.genre=g;renderForm();}
function formIng(i,key,val){formState.ingredients[i][key]=val; if(key==='item'){/* requiredの候補が変わるので再描画は重い→保存時に整合）*/}}
function formAddIng(){formState.ingredients.push({item:'',qty:'',unit:''});renderForm();}
function formDelIng(i){if(formState.ingredients.length<=1){formState.ingredients=[{item:'',qty:'',unit:''}];}else{formState.ingredients.splice(i,1);}renderForm();}
function formStep(i,val){formState.steps[i]=val;}
function formAddStep(){formState.steps.push('');renderForm();}
function formDelStep(i){if(formState.steps.length<=1){formState.steps=[''];}else{formState.steps.splice(i,1);}renderForm();}
function formToggleReq(it){const idx=formState.required.indexOf(it);if(idx>=0)formState.required.splice(idx,1);else formState.required.push(it);renderForm();}
function formTogglePublic(){formState.isPublic=!formState.isPublic;renderForm();}

function saveForm(){
  const f=formState;
  const err=document.getElementById('formErr');
  // バリデーション
  const name=(f.name||'').trim();
  const ings=f.ingredients.filter(i=>(i.item||'').trim());
  const steps=f.steps.filter(s=>(s||'').trim());
  let problems=[];
  if(!name)problems.push('料理名');
  if(ings.length===0)problems.push('材料（1つ以上）');
  if(steps.length===0)problems.push('作り方（1つ以上）');
  if(problems.length){
    err.textContent='次の項目を入力してください：'+problems.join('、');
    err.style.display='block';
    document.getElementById('formScroll').scrollTop=0;
    return;
  }
  // requiredが空なら材料名から自動で主要そうなものを補完(調味料っぽいものを除く)
  let required=f.required.filter(r=>ings.some(i=>i.item.trim()===r));
  if(required.length===0){
    const SEASONING=/(醤油|塩|砂糖|みりん|酒|味噌|油|こしょう|ソース|ケチャップ|マヨ|だし|片栗粉|小麦粉|酢|ごま|バター|にんにく|生姜|スープの素|豆板醤|わさび|のり|かつお節)/;
    required=ings.map(i=>i.item.trim()).filter(it=>!SEASONING.test(it)).slice(0,4);
    if(required.length===0)required=[ings[0].item.trim()];
  }
  const clean={
    id:f.id, name, emoji:f.emoji||'🍽', genre:f.genre||'他',
    required,
    ingredients:ings.map(i=>({item:i.item.trim(),qty:(i.qty===''||i.qty==null)?1:(parseFloat(i.qty)||i.qty),unit:(i.unit||'').trim()})),
    steps, tips:(f.tips||'').trim(),
    time:f.time?parseInt(f.time)||0:0, cost:f.cost?parseInt(f.cost)||0:0,
    kcal:f.kcal?parseInt(f.kcal)||0:0, difficulty:f.difficulty||1,
    isPublic:!!f.isPublic, createdAt:f.createdAt||Date.now(), updatedAt:Date.now(),
  };
  const arr=loadMyRecipes();
  const idx=arr.findIndex(x=>x.id===clean.id);
  if(currentUser && supa){
    // ログイン中: クラウドに保存
    closeForm();
    showToast('保存中...');
    saveRecipeCloud(clean).then(res=>{
      if(res.ok){ renderMyRecipes(); showToast(idx>=0?'レシピを更新しました':'レシピを登録しました'); }
      else { showToast('保存に失敗しました: '+(res.reason||'')); }
    });
  }else{
    // 未ログイン: ローカル保存(従来通り)
    if(idx>=0)arr[idx]=clean; else arr.push(clean);
    saveMyRecipes(arr);
    closeForm();
    renderMyRecipes();
    showToast(idx>=0?'レシピを更新しました':'レシピを登録しました');
  }
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toastT);window.__toastT=setTimeout(()=>t.classList.remove('show'),2400);}

/* ============================================================
   Supabase 連携 (ログイン・クラウド保存・公開レシピ)
   ============================================================ */
function recipeToDb(mr, userId){
  return {
    id: mr.id, user_id: userId, name: mr.name, emoji: mr.emoji||'🍽',
    genre: mr.genre||'他', required: mr.required||[],
    ingredients: mr.ingredients||[], steps: mr.steps||[], tips: mr.tips||'',
    time: mr.time||0, cost: mr.cost||0, kcal: mr.kcal||0,
    difficulty: mr.difficulty||1, is_public: !!mr.isPublic,
    created_at: mr.createdAt ? new Date(mr.createdAt).toISOString() : new Date().toISOString(),
  };
}
function recipeFromDb(row){
  return {
    id: row.id, name: row.name, emoji: row.emoji||'🍽', genre: row.genre||'他',
    required: row.required||[], ingredients: row.ingredients||[], steps: row.steps||[],
    tips: row.tips||'', time: row.time||0, cost: row.cost||0, kcal: row.kcal||0,
    difficulty: row.difficulty||1, isPublic: !!row.is_public,
    createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
    user_id: row.user_id,
  };
}
async function fetchMyCloudRecipes(){
  if(!supa || !currentUser) return;
  try{
    const { data, error } = await supa.from('recipes').select('*').eq('user_id', currentUser.id).order('created_at',{ascending:false});
    if(error){ console.warn('取得エラー', error); return; }
    cloudRecipes = (data||[]).map(recipeFromDb);
    updateBadges();
  }catch(e){ console.warn('fetch失敗', e); }
}
async function saveRecipeCloud(mr){
  if(!supa || !currentUser) return {ok:false, reason:'not_logged_in'};
  try{
    const row = recipeToDb(mr, currentUser.id);
    // IDがuuid形式(ハイフン区切り)なら更新、独自形式(my...)ならIDを外して新規作成(DBが自動採番)
    const isUuid = typeof row.id==='string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(row.id);
    if(!isUuid){ delete row.id; }
    const { error } = await supa.from('recipes').upsert(row);
    if(error){ return {ok:false, reason:error.message}; }
    await fetchMyCloudRecipes();
    return {ok:true};
  }catch(e){ return {ok:false, reason:String(e)}; }
}
async function deleteRecipeCloud(id){
  if(!supa || !currentUser) return {ok:false};
  try{
    const { error } = await supa.from('recipes').delete().eq('id', id);
    if(error){ return {ok:false, reason:error.message}; }
    await fetchMyCloudRecipes();
    return {ok:true};
  }catch(e){ return {ok:false, reason:String(e)}; }
}

function gotoAuth(view){ authView=view; renderAccount(); }

// パスワード強度のライブチェック
function pwStatus(){
  const pw1 = (document.getElementById('suPw1')||{}).value || '';
  const pw2 = (document.getElementById('suPw2')||{}).value || '';
  const email = ((document.getElementById('suEmail')||{}).value || '').trim();
  return {
    len: pw1.length>=6,
    alpha: /[a-zA-Z]/.test(pw1),
    num: /[0-9]/.test(pw1),
    match: pw1.length>0 && pw1===pw2,
    email: /.+@.+\..+/.test(email),
  };
}
function checkPwLive(){
  const s = pwStatus();
  const set=(id,ok)=>{const el=document.getElementById(id); if(el) el.className='pw-rule'+(ok?' ok':'');};
  set('rule-len', s.len); set('rule-alpha', s.alpha); set('rule-num', s.num); set('rule-match', s.match);
  const btn = document.getElementById('suBtn');
  if(btn) btn.disabled = !(s.len && s.alpha && s.num && s.match && s.email);
}
async function doSignup(){
  const s = pwStatus();
  const email = ((document.getElementById('suEmail')||{}).value||'').trim();
  const pw = (document.getElementById('suPw1')||{}).value||'';
  const err = document.getElementById('authErr');
  if(!s.email){ err.textContent='メールアドレスを正しく入力してください'; err.style.display='block'; return; }
  if(!(s.len && s.alpha && s.num)){ err.textContent='パスワードの条件を満たしていません'; err.style.display='block'; return; }
  if(!s.match){ err.textContent='確認用パスワードが一致しません'; err.style.display='block'; return; }
  err.style.display='none'; showToast('登録中...');
  try{
    const { data, error } = await supa.auth.signUp({ email, password: pw });
    if(error){ err.textContent='登録エラー: '+error.message; err.style.display='block'; return; }
    // セッションが即発行された(メール確認オフ)場合はそのままログイン
    if(data.session){ await onLoggedIn(data.user); return; }
    // メール確認待ち画面へ
    pendingEmail = email;
    authView = 'verify';
    renderAccount();
  }catch(e){ err.textContent='エラー: '+String(e); err.style.display='block'; }
}

async function doLogin(){
  const email = ((document.getElementById('loginEmail')||{}).value||'').trim();
  const pw = (document.getElementById('loginPassword')||{}).value||'';
  const err = document.getElementById('authErr');
  if(!email || !pw){ err.textContent='メールアドレスとパスワードを入力してください'; err.style.display='block'; return; }
  err.style.display='none'; showToast('ログイン中...');
  try{
    const { data, error } = await supa.auth.signInWithPassword({ email, password: pw });
    if(error){ err.textContent='ログインエラー: '+error.message; err.style.display='block'; return; }
    if(data.user){ await onLoggedIn(data.user); }
  }catch(e){ err.textContent='エラー: '+String(e); err.style.display='block'; }
}
async function doLogout(){
  try{ await supa.auth.signOut(); }catch(e){}
  currentUser = null; cloudRecipes = null;
  updateAccountIcon(); updateBadges(); renderAccount();
  showToast('ログアウトしました');
}
async function onLoggedIn(user){
  currentUser = user;
  await fetchMyCloudRecipes();
  updateAccountIcon(); updateBadges(); renderAccount();
  showToast('ログインしました');
}
function updateAccountIcon(){
  const ic = document.getElementById('accountIcon');
  if(ic) ic.textContent = currentUser ? '✅' : '👤';
}
async function uploadLocalRecipes(){
  let local = [];
  try{ local = JSON.parse(localStorage.getItem('my_recipes_v1')||'[]'); }catch(e){}
  if(local.length===0){ showToast('移すレシピがありません'); return; }
  showToast(`${local.length}件を移行中...`);
  let ok=0;
  for(const mr of local){
    const copy = {...mr}; delete copy.id;
    const row = recipeToDb(copy, currentUser.id); delete row.id;
    try{ const { error } = await supa.from('recipes').insert(row); if(!error) ok++; }catch(e){}
  }
  if(ok>0){ localStorage.removeItem('my_recipes_v1'); }
  await fetchMyCloudRecipes(); renderAccount();
  showToast(`${ok}件をクラウドに移しました`);
}

    if(error){ document.getElementById('publicScroll').innerHTML = `<div class="memo-empty"><div class="big">⚠️</div><div class="sub">読み込みエラー: ${escapeHtml(error.message)}</div></div>`; return; }

}
function renderPublicList(){
  const sc = document.getElementById('publicScroll');

  sc.innerHTML = publicCache.map(r=>{
    const mine = currentUser && r.user_id===currentUser.id;
    return `<div class="pub-card" onclick="openPublicRecipe('${r.id}')">
      <span class="pub-emoji">${r.emoji||'🍽'}</span>
      <div class="pub-body">
        <div class="pub-name">${escapeHtml(r.name)}${mine?'<span class="pub-mine">自分</span>':''}</div>
        <div class="pub-meta">${r.genre||'他'}・材料${(r.ingredients||[]).length}・手順${(r.steps||[]).length}</div>
      </div>
      <span class="pub-arrow">›</span>
    </div>`;
  }).join('');
}
let publicViewItem = null;
function openPublicRecipe(id){

  publicViewItem = toRecipeShape(r); publicViewItem.isPublicView = true;
  closePublic();
  setTimeout(()=>openModalDirect(publicViewItem), 150);

function openModalDirect(r){
  modalServings = servings; renderModal(r);
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}

/* ---- 起動時 ---- */
async function bootSupabase(){
  const ok = initSupabase(); updateAccountIcon();
  if(!ok || !supa){ return; }
  try{
    const { data } = await supa.auth.getSession();
    if(data && data.session && data.session.user){
      currentUser = data.session.user;
      await fetchMyCloudRecipes(); updateAccountIcon(); updateBadges();
    }
  }catch(e){ console.warn('セッション復元失敗', e); }
}
bootSupabase();
